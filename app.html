<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS Dojo</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* themes */
  :root[data-theme="dark"] {
    --bg:       #111113;
    --bg2:      #18181b;
    --bg3:      #1f1f23;
    --bg4:      #27272c;
    --border:   #2e2e35;
    --text:     #e4e4e8;
    --text2:    #8b8b9e;
    --text3:    #55555f;
    --sol-bg:   #111113;
    --sol-text: #c8cdd6;
    --shadow:   0 2px 12px rgba(0,0,0,0.5);
  }
  :root[data-theme="light"] {
    --bg:       #f4f4f5;
    --bg2:      #ffffff;
    --bg3:      #f0f0f2;
    --bg4:      #e4e4e8;
    --border:   #d4d4db;
    --text:     #111113;
    --text2:    #4a4a57;
    --text3:    #7a7a8a;
    --sol-bg:   #f8f8fa;
    --sol-text: #1a1a24;
    --shadow:   0 2px 8px rgba(0,0,0,0.08);
    --accent:       #0066cc;
    --accent2:      #0052a3;
    --accent-dim:   rgba(0,102,204,0.08);
    --green:        #1a7340;
    --green-dim:    rgba(26,115,64,0.09);
    --amber:        #7a5200;
    --amber-dim:    rgba(122,82,0,0.09);
    --red:          #b52a2a;
    --red-dim:      rgba(181,42,42,0.09);
    --blue:         #1355a0;
    --blue-dim:     rgba(19,85,160,0.09);
    --purple:       #6b28c8;
    --purple-dim:   rgba(107,40,200,0.09);
    --btn-run-text: #fff;
  }
  :root[data-theme="solarized"] {
    --bg:       #002b36;
    --bg2:      #073642;
    --bg3:      #0a3d4a;
    --bg4:      #0d4555;
    --border:   #155060;
    --text:     #fdf6e3;
    --text2:    #93a1a1;
    --text3:    #657b83;
    --sol-bg:   #002b36;
    --sol-text: #eee8d5;
    --shadow:   0 2px 12px rgba(0,0,0,0.5);
  }
  :root[data-theme="mocha"] {
    --bg:       #1e1e2e;
    --bg2:      #24273a;
    --bg3:      #292c3c;
    --bg4:      #313449;
    --border:   #3b3f5c;
    --text:     #cdd6f4;
    --text2:    #a6adc8;
    --text3:    #6c7086;
    --sol-bg:   #1e1e2e;
    --sol-text: #bac2de;
    --shadow:   0 2px 12px rgba(0,0,0,0.5);
  }

  :root {
    --accent:     #4a9eff;
    --accent2:    #2e87f0;
    --accent-dim: rgba(74,158,255,0.10);
    --green:      #3fb27f;
    --green-dim:  rgba(63,178,127,0.10);
    --amber:      #d4952a;
    --amber-dim:  rgba(212,149,42,0.10);
    --red:        #e05555;
    --red-dim:    rgba(224,85,85,0.10);
    --blue:       #4a9eff;
    --blue-dim:   rgba(74,158,255,0.10);
    --purple:     #a87eeb;
    --purple-dim: rgba(168,126,235,0.10);
    --radius:     6px;
    --font-mono:  'JetBrains Mono', ui-monospace, monospace;
    --font-ui:    -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --sidebar-w:  240px;
    --transition: 0.12s;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 14px;
    min-height: 100vh;
    line-height: 1.5;
  }

  .layout { display: flex; min-height: 100vh; }

  /* sidebar */
  .sidebar {
    width: var(--sidebar-w);
    flex-shrink: 0;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    z-index: 100;
    transition: transform var(--transition);
  }

  .sidebar-logo {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    flex-shrink: 0;
  }
  .logo-left { flex: 1; min-width: 0; }
  .logo-text {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.2px;
    white-space: nowrap;
  }
  .logo-sub {
    font-size: 11px;
    color: var(--text3);
    font-family: var(--font-mono);
    margin-top: 2px;
  }

  /* theme switcher */
  .theme-switcher { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
  .theme-switcher-label { font-size: 10px; color: var(--text3); font-family: var(--font-mono); text-align: center; }
  .theme-btns { display: flex; gap: 5px; }
  .theme-dot {
    width: 14px; height: 14px; border-radius: 50%;
    border: 1px solid transparent;
    cursor: pointer;
    transition: border-color var(--transition);
    flex-shrink: 0;
  }
  .theme-dot.active { border-color: var(--accent); }
  .theme-dot[data-t="dark"]      { background: #111113; box-shadow: 0 0 0 1px #2e2e35; }
  .theme-dot[data-t="light"]     { background: #f4f4f5; box-shadow: 0 0 0 1px #d4d4db; }
  .theme-dot[data-t="solarized"] { background: #002b36; box-shadow: 0 0 0 1px #155060; }
  .theme-dot[data-t="mocha"]     { background: #1e1e2e; box-shadow: 0 0 0 1px #3b3f5c; }

  /* ─── progress ─── */
  .sidebar-progress {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .prog-counts { display: flex; gap: 16px; margin-bottom: 8px; align-items: center; }
  .prog-stat { font-size: 12px; color: var(--text3); font-family: var(--font-mono); }
  .prog-stat b { color: var(--text); font-weight: 500; }
  .review-stat { font-size: 12px; color: var(--text3); font-family: var(--font-mono); }
  .review-stat b { color: var(--text2); font-weight: 500; }

  /* progress bar */
  .prog-bar-wrap {
    height: 4px;
    background: var(--bg4);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .prog-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.4s ease, background 0.4s ease;
    width: 0%;
    background: var(--text3);
  }
  /* color shifts as progress increases */
  .prog-bar-fill.p0  { background: var(--text3); }
  .prog-bar-fill.p25 { background: var(--amber); }
  .prog-bar-fill.p50 { background: var(--blue); }
  .prog-bar-fill.p75 { background: var(--green); }
  .prog-bar-fill.p100 { background: var(--green); box-shadow: 0 0 6px rgba(63,178,127,0.4); }

  /* reset-all button */
  .btn-reset-all {
    width: 100%;
    padding: 5px 8px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text3);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: color var(--transition), border-color var(--transition), background var(--transition);
    text-align: center;
  }
  .btn-reset-all:hover { color: var(--red); border-color: var(--red); background: var(--red-dim); }

  /* topic nav */
  .topic-nav { padding: 8px; flex: 1; overflow-y: auto; }
  .topic-nav-label {
    font-size: 11px; color: var(--text3); font-family: var(--font-mono);
    padding: 4px 8px; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.06em;
  }
  .topic-btn {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; padding: 6px 8px; border-radius: var(--radius); border: none;
    background: transparent; color: var(--text2); font-family: var(--font-ui);
    font-size: 13px; cursor: pointer; text-align: left; transition: background var(--transition), color var(--transition); gap: 8px;
  }
  .topic-btn:hover { background: var(--bg3); color: var(--text); }
  .topic-btn.active { background: var(--bg4); color: var(--text); }
  .topic-btn .t-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .topic-btn .t-count {
    font-family: var(--font-mono); font-size: 10px; color: var(--text3);
    flex-shrink: 0;
  }
  .topic-btn.active .t-count { color: var(--text2); }
  .topic-btn .t-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
  .topic-btn.active .t-dot { background: var(--accent); }

  /* hamburger */
  .hamburger {
    display: none;
    position: fixed; top: 12px; left: 12px; z-index: 200;
    width: 36px; height: 36px; border-radius: var(--radius);
    background: var(--bg2); border: 1px solid var(--border);
    cursor: pointer; align-items: center; justify-content: center;
    flex-direction: column; gap: 4px;
  }
  .hamburger span { display: block; width: 16px; height: 1.5px; background: var(--text2); transition: transform var(--transition), opacity var(--transition); }
  .hamburger.open span:nth-child(1) { transform: translateY(5.5px) rotate(45deg); }
  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { transform: translateY(-5.5px) rotate(-45deg); }

  .overlay { display: none; position: fixed; inset: 0; z-index: 90; background: rgba(0,0,0,0.4); }
  .overlay.visible { display: block; }

  /* main */
  .main { flex: 1; padding: 28px 32px; min-width: 0; overflow-x: hidden; }

  .topic-header { margin-bottom: 20px; }
  .topic-title { font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 2px; letter-spacing: -0.3px; }
  .topic-desc { font-size: 12px; color: var(--text3); font-family: var(--font-mono); }

  /* question card */
  .q-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
  }
  .q-card.solved { border-left: 3px solid var(--green); }

  .q-header { padding: 12px 16px 8px; display: flex; align-items: flex-start; gap: 10px; border-bottom: 1px solid var(--border); }
  .q-num { font-family: var(--font-mono); font-size: 11px; color: var(--text3); flex-shrink: 0; margin-top: 3px; }
  .q-title-wrap { flex: 1; min-width: 0; }
  .q-title { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 4px; line-height: 1.4; }
  .q-badges { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
  .badge { font-size: 10px; padding: 1px 6px; border-radius: 3px; font-family: var(--font-mono); font-weight: 400; }
  .badge-easy   { background: var(--green-dim); color: var(--green); }
  .badge-medium { background: var(--amber-dim); color: var(--amber); }
  .badge-hard   { background: var(--red-dim);   color: var(--red); }
  .badge-solved { background: var(--green-dim); color: var(--green); }

  /* header right controls (review + unsolved btn) */
  .q-header-controls { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

  /* mark unsolved button — only visible on solved cards */
  .btn-unsolved {
    font-family: var(--font-mono); font-size: 10px;
    padding: 3px 7px; border-radius: var(--radius);
    border: 1px solid var(--border);
    background: transparent; color: var(--text3); cursor: pointer;
    transition: color var(--transition), border-color var(--transition), background var(--transition);
    white-space: nowrap;
  }
  .btn-unsolved:hover { color: var(--amber); border-color: var(--amber); background: var(--amber-dim); }

  /* two-column split body */
  .q-body {
    display: grid;
    grid-template-columns: minmax(0, 2fr) minmax(0, 3fr);
    min-height: 0;
  }
  .q-left {
    padding: 14px 16px;
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 10px;
    overflow: hidden;
  }
  .q-right {
    padding: 14px 16px;
    display: flex; flex-direction: column; gap: 8px;
    min-width: 0;
  }
  .q-right .action-row { margin-top: auto; padding-top: 8px; }

  .q-desc { font-size: 12.5px; color: var(--text2); font-family: var(--font-mono); line-height: 1.65; }
  .q-desc code { color: var(--amber); background: var(--amber-dim); padding: 0 4px; border-radius: 3px; font-size: 11.5px; }

  @media (max-width: 780px) {
    .q-body { grid-template-columns: 1fr; }
    .q-left { border-right: none; border-bottom: 1px solid var(--border); }
    .q-right .action-row { margin-top: 0; padding-top: 0; }
  }

  .q-example {
    background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 8px 12px; font-family: var(--font-mono); font-size: 12px;
    color: var(--text3); margin-bottom: 10px; line-height: 1.7;
  }
  .q-example .ex-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
  .q-example .ex-in  { color: var(--text2); }
  .q-example .ex-out { color: var(--green); }

  /* editor */
  .editor-wrap {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 10px;
    transition: border-color var(--transition);
  }
  .editor-wrap:focus-within { border-color: var(--accent); }
  .editor-toolbar {
    background: var(--bg4); padding: 5px 10px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .editor-lang { font-family: var(--font-mono); font-size: 10px; color: var(--text3); }
  .editor-dots { display: flex; gap: 4px; }
  .editor-dots span { width: 7px; height: 7px; border-radius: 50%; }
  .editor-dots .d1 { background: #ff5f57; }
  .editor-dots .d2 { background: #febc2e; }
  .editor-dots .d3 { background: #28c840; }
  .editor-shortcuts { font-family: var(--font-mono); font-size: 10px; color: var(--text3); }

  /* buttons */
  .action-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .left-btns  { display: flex; gap: 6px; flex-wrap: wrap; margin-top: auto; padding-top: 8px; }
  .btn {
    font-family: var(--font-ui); font-size: 12px; font-weight: 500;
    padding: 6px 12px; border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--bg3); color: var(--text2); cursor: pointer;
    transition: background var(--transition), color var(--transition), border-color var(--transition);
    white-space: nowrap;
  }
  .btn:hover { background: var(--bg4); color: var(--text); border-color: var(--border); }
  .btn-run {
    background: var(--accent); color: var(--btn-run-text, #0d0d0f);
    border-color: var(--accent); font-weight: 500;
  }
  .btn-run:hover { background: var(--accent2); border-color: var(--accent2); color: var(--btn-run-text, #0d0d0f); }
  .btn-hint { color: var(--text2); }
  .btn-sol  { color: var(--text2); }
  .btn-reset { color: var(--text3); }
  .btn-reset:hover { color: var(--red); border-color: var(--red); background: var(--red-dim); }

  /* result */
  .result-box {
    margin-top: 8px; padding: 8px 12px; border-radius: var(--radius);
    font-family: var(--font-mono); font-size: 12px; line-height: 1.5; display: none;
    border-left: 2px solid;
  }
  .result-pass { background: var(--green-dim);  border-color: var(--green);  color: var(--green); }
  .result-fail { background: var(--red-dim);    border-color: var(--red);    color: var(--red); }
  .result-err  { background: var(--amber-dim);  border-color: var(--amber);  color: var(--amber); }

  /* hint / solution */
  .hint-box {
    margin-top: 8px; padding: 10px 12px;
    background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius);
    font-family: var(--font-mono); font-size: 12px; color: var(--text2); line-height: 1.65; display: none;
  }
  .hint-box code { color: var(--blue); padding: 0 3px; }
  .hint-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }

  .sol-box {
    margin-top: 8px; background: var(--sol-bg);
    border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; display: none;
  }
  .sol-toolbar {
    background: var(--bg4); padding: 5px 10px;
    font-family: var(--font-mono); font-size: 10px; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.06em;
    border-bottom: 1px solid var(--border);
  }
  .sol-code { padding: 12px 14px; font-family: var(--font-mono); font-size: 12px; color: var(--sol-text); white-space: pre; overflow-x: auto; line-height: 1.65; }

  /* predict / discuss inputs */
  .code-snippet {
    background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden; margin-bottom: 10px;
  }
  .snippet-toolbar {
    background: var(--bg4); padding: 5px 10px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .snippet-toolbar .editor-dots { display: flex; gap: 4px; }
  .snippet-toolbar .editor-dots span { width: 7px; height: 7px; border-radius: 50%; }
  .snippet-toolbar .editor-dots .d1 { background: #ff5f57; }
  .snippet-toolbar .editor-dots .d2 { background: #febc2e; }
  .snippet-toolbar .editor-dots .d3 { background: #28c840; }
  .snippet-lang { font-family: var(--font-mono); font-size: 10px; color: var(--text3); }
  .snippet-code { padding: 12px 14px; font-family: var(--font-mono); font-size: 12px; color: var(--sol-text); white-space: pre; overflow-x: auto; line-height: 1.65; margin: 0; }
  .predict-input-wrap { margin-bottom: 10px; }
  .predict-label { font-family: var(--font-mono); font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; }
  .discuss-label { font-family: var(--font-mono); font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; }
  .predict-input, .discuss-input {
    width: 100%; font-family: var(--font-mono); font-size: 12px;
    background: var(--bg3); color: var(--text); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 8px 12px; outline: none;
    resize: vertical; min-height: 44px; line-height: 1.65;
    transition: border-color var(--transition);
  }
  .discuss-input { min-height: 80px; font-family: var(--font-ui); font-size: 13px; }
  .predict-input:focus, .discuss-input:focus { border-color: var(--accent); }
  .predict-input::placeholder, .discuss-input::placeholder { color: var(--text3); }

  /* review button */
  .btn-review {
    font-family: var(--font-mono); font-size: 11px;
    padding: 3px 8px; border-radius: var(--radius); border: 1px solid transparent;
    background: transparent; color: var(--text3); cursor: pointer;
    transition: color var(--transition), border-color var(--transition);
  }
  .btn-review:hover { color: var(--text2); border-color: var(--border); }
  .btn-review.active { color: var(--amber); border-color: var(--border); }

  /* toolbar */
  .main-toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-group { display: flex; gap: 4px; flex-wrap: wrap; }
  .filter-pill {
    font-family: var(--font-mono); font-size: 11px;
    padding: 4px 10px; border-radius: var(--radius); border: 1px solid var(--border);
    background: transparent; color: var(--text3); cursor: pointer;
    transition: background var(--transition), color var(--transition), border-color var(--transition);
  }
  .filter-pill:hover { color: var(--text); background: var(--bg3); }
  .filter-pill.active { background: var(--bg3); color: var(--text); border-color: var(--border); }
  .filter-pill.pill-easy.active   { background: var(--green-dim);  border-color: var(--green);  color: var(--green); }
  .filter-pill.pill-medium.active { background: var(--amber-dim);  border-color: var(--amber);  color: var(--amber); }
  .filter-pill.pill-hard.active   { background: var(--red-dim);    border-color: var(--red);    color: var(--red); }
  .filter-pill.pill-review.active { background: var(--amber-dim);  border-color: var(--amber);  color: var(--amber); }
  /* new status filter pills */
  .filter-pill.pill-pending.active { background: var(--blue-dim);   border-color: var(--blue);   color: var(--blue); }
  .filter-pill.pill-done.active    { background: var(--green-dim);  border-color: var(--green);  color: var(--green); }

  .toolbar-sep { width: 1px; height: 16px; background: var(--border); margin: 0 2px; flex-shrink: 0; }
  .toolbar-count { font-family: var(--font-mono); font-size: 11px; color: var(--text3); margin-left: auto; }

  /* sidebar stats */
  .review-stat { font-size: 12px; color: var(--text3); font-family: var(--font-mono); }
  .review-stat b { color: var(--text2); font-weight: 500; }

  /* view toggle */
  .view-toggle {
    display: flex; gap: 1px;
    border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden; margin-left: 4px;
  }
  .view-btn {
    font-family: var(--font-mono); font-size: 11px; padding: 4px 10px;
    border: none; background: transparent; color: var(--text3); cursor: pointer;
    transition: background var(--transition), color var(--transition);
  }
  .view-btn:hover { color: var(--text); background: var(--bg3); }

<script>
const TOPIC_META = {
  "switch":            { desc: "switch statements & fall-through", color: "#60a5ff" },
  "while":             { desc: "while loops", color: "#fb923c" },
  "do-while":          { desc: "do…while loops", color: "#fb923c" },
  "loops":             { desc: "for, for-of, for-in", color: "#fb923c" },
  "closures":          { desc: "closures & lexical scope", color: "#c084fc" },
  "objects":           { desc: "objects & prototype chain", color: "#ffd060" },
  "classes":           { desc: "classes, inheritance, static", color: "#ffd060" },
  "async":             { desc: "promises, async/await", color: "#00e5a0" },
  "error-handling":    { desc: "try/catch, custom errors", color: "#ff6b6b" },
  "currying":          { desc: "currying & partial application", color: "#c084fc" },
  "array-methods":     { desc: "map, filter, reduce, find, flat, sort", color: "#60a5ff" },
  "string-methods":    { desc: "split, join, slice, replace, template literals", color: "#60a5ff" },
  "debounce-throttle": { desc: "debounce & throttle", color: "#00e5a0" },
  "pass-by-value-ref":  { desc: "predict: value vs reference", color: "#fb923c" },
  "closures-quiz":      { desc: "predict: closure behaviour", color: "#c084fc" },
  "flow-quiz":          { desc: "predict: event loop & async flow", color: "#60a5ff" },
  "hoisting-types":     { desc: "predict: hoisting & type coercion", color: "#ffd060" },
  "inheritance-context": { desc: "this, call/apply/bind, prototypal inheritance", color: "#f472b6" },
  "complex":             { desc: "algorithmic challenges & advanced patterns", color: "#34d399" },
  "quirks":              { desc: "JS quirks & edge cases", color: "#f87171" },
  "wtf":                 { desc: "wtf: try/finally, self-referencing, mind-benders", color: "#a78bfa" },
};

const Q = [
  // ──────────────── add your questions here ────────────────
  { id:1, topic:"switch", title:"Day name from number", diff:"easy",
    desc:"Write <code>getDayName(n)</code> returning the day name for 1=Monday … 7=Sunday. Use a <code>switch</code>. Return <code>'Invalid'</code> otherwise.",
    example:{ in:"getDayName(3)", out:"'Wednesday'" },
    hint:"Use <code>switch(n)</code> with cases 1–7 and a <code>default</code> case.",
    sol:`function getDayName(n) {
  switch(n) {
    case 1: return 'Monday';
    case 2: return 'Tuesday';
    case 3: return 'Wednesday';
    case 4: return 'Thursday';
    case 5: return 'Friday';
    case 6: return 'Saturday';
    case 7: return 'Sunday';
    default: return 'Invalid';
  }
}`,
    test: f => f(1)==='Monday' && f(3)==='Wednesday' && f(7)==='Sunday' && f(0)==='Invalid' },

  { id:2, topic:"switch", title:"Traffic light action", diff:"easy",
    desc:"Write <code>trafficAction(color)</code> returning <code>'Go'</code> for green, <code>'Slow down'</code> for yellow, <code>'Stop'</code> for red, and <code>'Unknown signal'</code> for anything else.",
    example:{ in:"trafficAction('red')", out:"'Stop'" },
    hint:"<code>switch(color)</code> with cases <code>'green', 'yellow', 'red'</code>.",
    sol:`function trafficAction(color) {
  switch(color) {
    case 'green':  return 'Go';
    case 'yellow': return 'Slow down';
    case 'red':    return 'Stop';
    default:       return 'Unknown signal';
  }
}`,
    test: f => f('green')==='Go' && f('red')==='Stop' && f('yellow')==='Slow down' && f('blue')==='Unknown signal' },

  { id:3, topic:"switch", title:"Calculator", diff:"medium",
    desc:"Write <code>calculate(a, op, b)</code> supporting <code>+ - * /</code>. Use switch. Return <code>null</code> for unknown op or division by zero.",
    example:{ in:"calculate(10, '/', 2)", out:"5" },
    hint:"In the <code>'/'</code> case check <code>if(b===0) return null</code>.",
    sol:`function calculate(a, op, b) {
  switch(op) {
    case '+': return a + b;
    case '-': return a - b;
    case '*': return a * b;
    case '/': return b === 0 ? null : a / b;
    default:  return null;
  }
}`,
    test: f => f(2,'+',3)===5 && f(10,'/',2)===5 && f(5,'/',0)===null && f(3,'%',1)===null },

  { id:4, topic:"switch", title:"HTTP status message", diff:"medium",
    desc:"Write <code>httpMessage(code)</code> returning the standard message for 200, 201, 400, 401, 403, 404, 500. Return <code>'Unknown'</code> for others.",
    example:{ in:"httpMessage(404)", out:"'Not Found'" },
    hint:"Use numeric cases: <code>case 200: return 'OK'</code> etc.",
    sol:`function httpMessage(code) {
  switch(code) {
    case 200: return 'OK';
    case 201: return 'Created';
    case 400: return 'Bad Request';
    case 401: return 'Unauthorized';
    case 403: return 'Forbidden';
    case 404: return 'Not Found';
    case 500: return 'Internal Server Error';
    default:  return 'Unknown';
  }
}`,
    test: f => f(200)==='OK' && f(404)==='Not Found' && f(500)==='Internal Server Error' && f(999)==='Unknown' },

  { id:5, topic:"switch", title:"Season from month (fall-through)", diff:"medium",
    desc:"Write <code>getSeason(month)</code> (1–12). Dec/Jan/Feb→Winter, Mar/Apr/May→Spring, Jun/Jul/Aug→Summer, Sep/Oct/Nov→Autumn. Use fall-through cases.",
    example:{ in:"getSeason(7)", out:"'Summer'" },
    hint:"<code>case 12: case 1: case 2: return 'Winter';</code> — each season shares three cases.",
    sol:`function getSeason(month) {
  switch(month) {
    case 12: case 1: case 2:  return 'Winter';
    case 3:  case 4: case 5:  return 'Spring';
    case 6:  case 7: case 8:  return 'Summer';
    case 9:  case 10: case 11: return 'Autumn';
    default: return 'Invalid';
  }
}`,
    test: f => f(1)==='Winter' && f(12)==='Winter' && f(6)==='Summer' && f(9)==='Autumn' && f(3)==='Spring' },

  // ──────────────── WHILE (5) ────────────────
  { id:6, topic:"while", title:"Count digits", diff:"easy",
    desc:"Write <code>countDigits(n)</code> counting how many digits a positive integer has using a while loop (no string conversion).",
    example:{ in:"countDigits(12345)", out:"5" },
    hint:"Divide <code>n</code> by 10 while <code>n >= 1</code>, incrementing a counter each time.",
    sol:`function countDigits(n) {
  let count = 0;
  while (n >= 1) { n = Math.floor(n / 10); count++; }
  return count;
}`,
    test: f => f(5)===1 && f(12)===2 && f(12345)===5 && f(1000)===4 },

  { id:7, topic:"while", title:"Sum until limit", diff:"easy",
    desc:"Write <code>sumUntil(arr, limit)</code> adding numbers left to right, stopping before the sum would exceed <code>limit</code>.",
    example:{ in:"sumUntil([1,2,3,4], 6)", out:"6" },
    hint:"Check <code>if(sum + arr[i] > limit) break</code> before adding.",
    sol:`function sumUntil(arr, limit) {
  let sum = 0, i = 0;
  while (i < arr.length) {
    if (sum + arr[i] > limit) break;
    sum += arr[i++];
  }
  return sum;
}`,
    test: f => f([1,2,3,4],6)===6 && f([5,5,5],9)===5 && f([1,1,1],10)===3 && f([10],5)===0 },

  { id:8, topic:"while", title:"Reverse a number", diff:"medium",
    desc:"Write <code>reverseNum(n)</code> reversing digits of a positive integer using a while loop. 1234 → 4321.",
    example:{ in:"reverseNum(1230)", out:"321" },
    hint:"Extract last digit with <code>n % 10</code>, build result as <code>result*10 + digit</code>, then <code>n = Math.floor(n/10)</code>.",
    sol:`function reverseNum(n) {
  let result = 0;
  while (n > 0) { result = result * 10 + (n % 10); n = Math.floor(n / 10); }
  return result;
}`,
    test: f => f(1234)===4321 && f(100)===1 && f(5)===5 },

  { id:9, topic:"while", title:"Collatz sequence steps", diff:"medium",
    desc:"Write <code>collatzSteps(n)</code> returning how many steps to reach 1. Rule: even→n/2, odd→3n+1.",
    example:{ in:"collatzSteps(6)", out:"8" },
    hint:"<code>while(n !== 1)</code>, increment steps. Even: halve, Odd: triple+1.",
    sol:`function collatzSteps(n) {
  let steps = 0;
  while (n !== 1) { n = n % 2 === 0 ? n / 2 : 3 * n + 1; steps++; }
  return steps;
}`,
    test: f => f(1)===0 && f(2)===1 && f(6)===8 },

  { id:10, topic:"while", title:"GCD — Euclidean algorithm", diff:"hard",
    desc:"Write <code>gcd(a, b)</code> returning the greatest common divisor using the Euclidean algorithm.",
    example:{ in:"gcd(48, 18)", out:"6" },
    hint:"<code>while(b !== 0) { let t = b; b = a % b; a = t; }</code> then return <code>a</code>.",
    sol:`function gcd(a, b) {
  while (b !== 0) { let t = b; b = a % b; a = t; }
  return a;
}`,
    test: f => f(48,18)===6 && f(100,75)===25 && f(7,13)===1 && f(12,12)===12 },

  // ──────────────── DO-WHILE (4) ────────────────
  { id:11, topic:"do-while", title:"First positive number", diff:"easy",
    desc:"Write <code>firstPositive(arr)</code> using a do-while loop. Return the first positive number, or <code>null</code> if none.",
    example:{ in:"firstPositive([-1, 0, 3, 5])", out:"3" },
    hint:"Check <code>arr[i] > 0</code> inside the do block. Condition: <code>++i < arr.length</code>.",
    sol:`function firstPositive(arr) {
  if (!arr.length) return null;
  let i = 0;
  do { if (typeof arr[i] === 'number' && arr[i] > 0) return arr[i]; } while (++i < arr.length);
  return null;
}`,
    test: f => f([-1,0,3,5])===3 && f([-2,-1])===null && f([7])===7 && f([])===null },

  { id:12, topic:"do-while", title:"Guess log", diff:"easy",
    desc:"Write <code>buildGuessLog(secret, guesses)</code> using do-while. Return an array of <code>'too low'</code>, <code>'too high'</code>, or <code>'correct'</code> for each guess.",
    example:{ in:"buildGuessLog(5,[3,7,5])", out:"['too low','too high','correct']" },
    hint:"Push a string inside the loop based on comparing <code>guesses[i]</code> to <code>secret</code>.",
    sol:`function buildGuessLog(secret, guesses) {
  const log = []; let i = 0;
  if (!guesses.length) return log;
  do {
    const g = guesses[i];
    log.push(g < secret ? 'too low' : g > secret ? 'too high' : 'correct');
  } while (++i < guesses.length);
  return log;
}`,
    test: f => JSON.stringify(f(5,[3,7,5]))===JSON.stringify(['too low','too high','correct']) },

  { id:13, topic:"do-while", title:"Accumulate until threshold", diff:"medium",

  { id:14, topic:"do-while", title:"Palindrome check", diff:"hard",

  { id:19, topic:"loops", title:"Multiplication table", diff:"hard",

  { id:21, topic:"closures", title:"Once function", diff:"easy",
    desc:"Write <code>once(fn)</code> returning a function that only executes <code>fn</code> on the first call. Subsequent calls return the first result.",
    example:{ in:"const init=once(()=>42); init(); init();", out:"42, 42 (called once)" },
    hint:"<code>let called = false, result</code>. On first call set called=true and cache result.",
    sol:`function once(fn) {

  { id:22, topic:"closures", title:"Memoize", diff:"hard",
    desc:"Write <code>memoize(fn)</code> that caches results by arguments. Same args = cached result, no re-execution.",

    hint:"<code>const cache = {}</code>. Key: <code>JSON.stringify(args)</code>.",
    sol:`function memoize(fn) {

  { id:73, topic:"objects", title:"Deep clone (recursive)", diff:"hard",
    desc:"Write <code>deepClone(obj)</code> returning a deep copy of a plain object — handles nested objects and arrays. No JSON trick allowed.",
    example:{ in:"const c=deepClone({a:{b:1},c:[1,2]}); c.a.b=99;", out:"original.a.b still 1" },
    hint:"If array → <code>obj.map(deepClone)</code>. If object → loop own keys and recurse. Else return primitive.",
    sol:`function deepClone(obj) {
  if (obj === null || typeof obj !== 'object') return obj;
  if (Array.isArray(obj)) return obj.map(deepClone);
  const copy = {};
  for (const key in obj) {

  { id:74, topic:"objects", title:"Flatten nested object", diff:"hard",
    desc:"Write <code>flattenObj(obj, prefix='')</code> converting <code>{a:{b:{c:1}}}</code> → <code>{'a.b.c':1}</code> using dot-notation keys.",
    example:{ in:"flattenObj({a:{b:1,c:{d:2}}})", out:"{'a.b':1,'a.c.d':2}" },
    hint:"Recurse when value is a non-null, non-array object. Use <code>prefix + '.' + key</code> for nested keys.",
    sol:`function flattenObj(obj, prefix = '') {
  const result = {};
  for (const key in obj) {
    const fullKey = prefix ? prefix + '.' + key : key;
    if (typeof obj[key]==='object'&&obj[key]!==null&&!Array.isArray(obj[key]))
      Object.assign(result, flattenObj(obj[key], fullKey));
    else result[fullKey] = obj[key];
  }
  return result;
}`,

  { id:77, topic:"objects", title:"Proxy — validation trap", diff:"hard",

  { id:85, topic:"classes", title:"EventEmitter class", diff:"hard",
    desc:"Build a class <code>EventEmitter</code> with methods: <code>on(event, fn)</code>, <code>off(event, fn)</code>, <code>emit(event, ...args)</code>, and <code>once(event, fn)</code> (auto-removes after first fire).",
    example:{ in:"const e=new EventEmitter(); e.on('click',fn); e.emit('click',42);", out:"fn called with 42" },
    hint:"Store listeners in <code>this._events = {}</code>. <code>once</code> wraps <code>fn</code> to call <code>off</code> after first invocation.",
    sol:`class EventEmitter {
  constructor() { this._events = {}; }
  on(event, fn) {
    if (!this._events[event]) this._events[event] = [];
    this._events[event].push(fn);
    return this;
  }
  off(event, fn) {
    if (!this._events[event]) return this;
    this._events[event] = this._events[event].filter(f => f !== fn);
    return this;
  }
  emit(event, ...args) {
    (this._events[event] || []).forEach(fn => fn(...args));
    return this;
  }
  once(event, fn) {
    const wrapper = (...args) => { fn(...args); this.off(event, wrapper); };
    return this.on(event, wrapper);
  }
}`,
    altTest: true,
    test: code => {
      try {
        eval(code);
        const e = new EventEmitter();

        e.emit('test', 42);
        e.emit('test', 99);
        e.off('test', fn);

        e.once('click', ()=>onceCount++);
        e.emit('click'); e.emit('click');
        return count===2&&val===99&&onceCount===1;
      } catch(e){return false;}
    } },

  { id:89, topic:"async", title:"Promise queue (concurrency limit)", diff:"hard",
    desc:"Write <code>pLimit(tasks, concurrency)</code> where <code>tasks</code> is an array of async functions. Run at most <code>concurrency</code> at a time. Return a Promise resolving to all results in order.",
    example:{ in:"await pLimit([t1,t2,t3,t4,t5], 2)", out:"results array, max 2 running at once" },
    hint:"Use a queue. Track active count. As each resolves, start the next. Use index pointers and recursive helper.",
    sol:`function pLimit(tasks, concurrency) {
  return new Promise((resolve, reject) => {
    const results = [];
    let active = 0, index = 0, completed = 0;
    function runNext() {
      while (active < concurrency && index < tasks.length) {
        const i = index++;
        active++;
        tasks[i]().then(val => {
          results[i] = val;
          active--;
          completed++;
          if (completed === tasks.length) resolve(results);
          else runNext();
        }).catch(reject);
      }
    }
    runNext();
  });
}`,
    test: f => { return f([()=>Promise.resolve(1),()=>Promise.resolve(2)],1) instanceof Promise; } },

  { id:42, topic:"error-handling", title:"Retry on failure", diff:"hard",

  { id:45, topic:"currying", title:"Curry any arity", diff:"hard",

  { id:49, topic:"currying", title:"Curried add N times", diff:"medium",
    desc:"Write <code>addN(n)</code> returning a chain of <code>n</code> functions each adding their argument, then returning the sum. <code>addN(3)(1)(2)(3)</code>→<code>6</code>.",

  { id:53, topic:"array-methods", title:"Sort objects by key", diff:"medium",
    desc:"Write <code>sortByKey(arr, key, asc=true)</code> returning a sorted copy without mutating the original.",
    example:{ in:"sortByKey([{n:3},{n:1}],'n')", out:"[{n:1},{n:3}]" },
    hint:"<code>[...arr].sort((a,b)=> asc?(a[key]>b[key]?1:-1):(a[key]<b[key]?1:-1))</code>.",
    sol:`function sortByKey(arr, key, asc = true) {

  { id:63, topic:"debounce-throttle", title:"Debounce leading edge", diff:"hard",

    sol:`function debounceLeading(fn, delay) {

  { id:64, topic:"debounce-throttle", title:"Throttle with trailing call", diff:"hard",
    desc:"Write <code>throttleTrailing(fn, limit)</code>. First call fires immediately. If more calls came during cooldown, one trailing call fires after the window.",
    example:{ in:"3 rapid calls → first fires, then one trailing", out:"fn called twice" },
    hint:"Track a trailing timer. When the first call fires, schedule a trailing setTimeout; cancel and reschedule on each new call.",
    sol:`function throttleTrailing(fn, limit) {
  let last = 0, timer = null;
  return function(...args) {
    const now = Date.now();
    if (now - last >= limit) { last=now; fn(...args); }
    else { clearTimeout(timer); timer=setTimeout(()=>{ last=Date.now(); fn(...args); }, limit-(now-last)); }
  };
}`,
    test: f => { let n=0; const t=f(()=>n++,50); t();t(); return n===1&&typeof t==='function'; } },

    hint:"Count char frequencies, then count the frequency-of-frequencies. For basic: only one unique freq. For extended: allow removing one char from one group.",
    sol:`function isValidString(str) {
  // count frequencies
  const freq = {};
  for (const c of str) freq[c] = (freq[c] || 0) + 1;
  const counts = Object.values(freq);
  const freqOfFreq = {};
  for (const n of counts) freqOfFreq[n] = (freqOfFreq[n] || 0) + 1;

  const keys = Object.keys(freqOfFreq).map(Number);

  // Basic: all same frequency
  if (keys.length === 1) return true;
  if (keys.length > 2) return false;

  const [lo, hi] = keys.sort((a,b)=>a-b);

  // One char appears once and its frequency is 1 (remove that one char):
  if (hi === 1 && freqOfFreq[hi] === 1) return true;
  // One char appears once and reducing by 1 equals the other freq:
  if (freqOfFreq[hi] === 1 && hi - 1 === lo) return true;
  // One char is at max freq + 1 and there's only one of them:
  if (freqOfFreq[hi] === 1 && hi - 1 === lo) return true;
  // All but one have same freq, the outlier has freq 1 more:
  if (freqOfFreq[lo] === 1 && lo - 1 === 0) return true;

  return false;
}`,

  { id:213, topic:"complex", title:"Implement Promise from scratch", diff:"hard",
    predict: false,
    desc:"Implement a basic <code>MyPromise</code> class with <code>.then(onFulfilled, onRejected)</code>, <code>.catch(onRejected)</code>, and static <code>MyPromise.resolve()</code> / <code>MyPromise.reject()</code>.",
    example:{ in:"new MyPromise(resolve => resolve(42)).then(v => v*2)", out:"MyPromise resolving to 84" },
    hint:"Track state (pending/fulfilled/rejected) and value. On resolve/reject, flush queued callbacks. <code>.then()</code> returns a new MyPromise that resolves with the return value of the handler.",
    sol:`class MyPromise {
  constructor(executor) {
    this._state = 'pending';
    this._value = undefined;
    this._handlers = [];
    try {
      executor(
        v => this._resolve(v),
        r => this._reject(r)
      );
    } catch(e) { this._reject(e); }
  }
  _resolve(value) {
    if (this._state !== 'pending') return;
    if (value && typeof value.then === 'function') {
      value.then(v => this._resolve(v), r => this._reject(r));
      return;
    }
    this._state = 'fulfilled';
    this._value = value;
    this._flush();
  }
  _reject(reason) {
    if (this._state !== 'pending') return;
    this._state = 'rejected';
    this._value = reason;
    this._flush();
  }
  _flush() {
    this._handlers.forEach(h => this._handle(h));
    this._handlers = [];
  }
  _handle(handler) {
    if (this._state === 'pending') { this._handlers.push(handler); return; }
    const fn = this._state === 'fulfilled' ? handler.onFulfilled : handler.onRejected;
    if (!fn) {
      this._state === 'fulfilled' ? handler.resolve(this._value) : handler.reject(this._value);
      return;
    }
    try { handler.resolve(fn(this._value)); }
    catch(e) { handler.reject(e); }
  }
  then(onFulfilled, onRejected) {
    return new MyPromise((resolve, reject) => {
      this._handle({ onFulfilled, onRejected, resolve, reject });
    });
  }
  catch(onRejected) { return this.then(null, onRejected); }
  static resolve(v) { return new MyPromise(res => res(v)); }
  static reject(r) { return new MyPromise((_, rej) => rej(r)); }
}`,

  { id:215, topic:"complex", title:"Find node in mirrored DOM tree", diff:"hard",
    discuss: true,
    desc:"Given two identical DOM trees (structurally the same, but different objects) and a node from tree A, find the corresponding node in tree B — without using IDs or class names.",
    hint:"Walk from the node up to the root recording the child index at each step (path). Then walk down tree B following the same path.",
    sol:`function findInOtherTree(nodeA, rootA, rootB) {
  // Build path from nodeA to rootA
  const path = [];
  let current = nodeA;
  while (current !== rootA) {
    const parent = current.parentNode;
    const index = Array.from(parent.childNodes).indexOf(current);
    path.unshift(index);
    current = parent;
  }
  // Walk the same path down rootB
  let nodeB = rootB;
  for (const index of path) {
    nodeB = nodeB.childNodes[index];
  }
  return nodeB;
}`,
    test: () => true },

// ─── Persistence ─────────────────────────────────────────────────────────
function persist() {
  try {
    localStorage.setItem('jsdojo-solved',   JSON.stringify([...solved]));
    localStorage.setItem('jsdojo-review',   JSON.stringify([...reviewLater]));
    localStorage.setItem('jsdojo-code',     JSON.stringify(userCode));
    localStorage.setItem('jsdojo-predict',  JSON.stringify(predictAnswers));
  } catch(e) {}
}
function loadPersisted() {
  try {
    const s = localStorage.getItem('jsdojo-solved');
    if (s) JSON.parse(s).forEach(id => solved.add(Number(id)));
    const r = localStorage.getItem('jsdojo-review');
    if (r) JSON.parse(r).forEach(id => reviewLater.add(Number(id)));
    const uc = localStorage.getItem('jsdojo-code');
    if (uc) Object.assign(userCode, JSON.parse(uc));
    const pa = localStorage.getItem('jsdojo-predict');
    if (pa) Object.assign(predictAnswers, JSON.parse(pa));
  } catch(e) {}
}

// ─── State ───
let activeTopic = 'all';
let activeDiff  = 'all';
const solved        = new Set();
const reviewLater   = new Set();
const userCode      = {};
const visHint       = {};
const visSol        = {};
const editors       = {};
const predictAnswers = {};
let viewMode     = localStorage.getItem('jsdojo-view') || 'all';
let currentIndex = 0;
loadPersisted();

// ─── Theme ───
const THEMES = ['dark','light','solarized','mocha'];
let currentTheme = localStorage.getItem('jsdojo-theme') || 'dark';
function applyTheme(t) {
  currentTheme = t;
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('jsdojo-theme', t);
  document.querySelectorAll('.theme-dot').forEach(d => d.classList.toggle('active', d.dataset.t === t));
  Object.values(editors).forEach(cm => cm.refresh());
}
document.querySelectorAll('.theme-dot').forEach(d => d.addEventListener('click', () => applyTheme(d.dataset.t)));
applyTheme(currentTheme);

// ─── Hamburger / Mobile Sidebar ───
const hamburger = document.getElementById('hamburger');
const sidebar   = document.getElementById('sidebar');
const overlay   = document.getElementById('overlay');
function openSidebar()  { sidebar.classList.add('open'); overlay.classList.add('visible'); hamburger.classList.add('open'); }
function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('visible'); hamburger.classList.remove('open'); }
hamburger.addEventListener('click', () => sidebar.classList.contains('open') ? closeSidebar() : openSidebar());
overlay.addEventListener('click', closeSidebar);

// ─── Reset All Modal ───
function openResetModal()  { document.getElementById('resetModal').classList.add('visible'); }
function closeResetModal() { document.getElementById('resetModal').classList.remove('visible'); }
function confirmResetAll() {
  solved.clear();
  reviewLater.clear();
  Object.keys(userCode).forEach(k => delete userCode[k]);
  Object.keys(predictAnswers).forEach(k => delete predictAnswers[k]);
  try {
    localStorage.removeItem('jsdojo-solved');
    localStorage.removeItem('jsdojo-review');
    localStorage.removeItem('jsdojo-code');
    localStorage.removeItem('jsdojo-predict');
  } catch(e) {}
  closeResetModal();
  currentIndex = 0;
  activeDiff = 'all';
  updateDiffPills();
  renderSidebar();
  renderCards();
}
// close modal on backdrop click
document.getElementById('resetModal').addEventListener('click', function(e) {
  if (e.target === this) closeResetModal();
});

// ─── Progress bar update ───
function updateProgressBar() {
  const total = Q.length;
  const done  = solved.size;
  const pct   = total === 0 ? 0 : Math.round((done / total) * 100);
  const bar = document.getElementById('progBar');
  if (!bar) return;
  bar.style.width = pct + '%';
  bar.className = 'prog-bar-fill';
  if (pct === 0)        bar.classList.add('p0');
  else if (pct < 25)    bar.classList.add('p0');
  else if (pct < 50)    bar.classList.add('p25');
  else if (pct < 75)    bar.classList.add('p50');
  else if (pct < 100)   bar.classList.add('p75');
  else                  bar.classList.add('p100');
}

// ─── Helpers ───
function topics() { return Object.keys(TOPIC_META); }

function filtered() {
  let qs = activeTopic === 'all' ? Q : Q.filter(q => q.topic === activeTopic);
  if (activeDiff === 'review')  return qs.filter(q => reviewLater.has(q.id));
  if (activeDiff === 'pending') return qs.filter(q => !solved.has(q.id));
  if (activeDiff === 'done')    return qs.filter(q => solved.has(q.id));
  if (activeDiff !== 'all')     return qs.filter(q => q.diff === activeDiff);
  return qs;
}
function topicCount(t)  { return Q.filter(q => q.topic === t).length; }
function topicSolved(t) { return Q.filter(q => q.topic === t && solved.has(q.id)).length; }

// ─── Sidebar ───
function renderSidebar() {
  const list = document.getElementById('topicList');
  const allBtn = `<button class="topic-btn ${activeTopic==='all'?'active':''}" onclick="setTopic('all')">
    <span class="t-dot"></span>
    <span class="t-name">all topics</span>
    <span class="t-count">${solved.size}/${Q.length}</span>
  </button>`;
  const btns = topics().map(t => {
    const cnt = topicCount(t); const sv = topicSolved(t);
    return `<button class="topic-btn ${activeTopic===t?'active':''}" onclick="setTopic('${t}')">
      <span class="t-dot"></span>
      <span class="t-name">${t}</span>
      <span class="t-count">${sv}/${cnt}</span>
    </button>`;
  }).join('');
  list.innerHTML = allBtn + btns;

  document.getElementById('statSolved').textContent = solved.size;
  document.getElementById('statTotal').textContent = Q.length;
  const rv = document.getElementById('statReview');
  if (rv) rv.textContent = reviewLater.size;

  updateProgressBar();
}

// ─── Header ───
function renderHeader() {
  if (activeTopic === 'all') {
    document.getElementById('topicTitle').innerHTML = 'All <span>Questions</span>';
    document.getElementById('topicDesc').textContent = `${Q.length} questions across ${topics().length} topics`;
  } else {
    const meta = TOPIC_META[activeTopic];
    const label = activeTopic.replace(/-/g,' ');
    document.getElementById('topicTitle').innerHTML = label.replace(/(\w+)$/, '<span>$1</span>');
    document.getElementById('topicDesc').textContent = meta.desc;
  }
}

// ─── Question cards ───
function getFnName(q) {
  const m = q.sol.match(/(?:function|class)\s+([A-Za-z][A-Za-z0-9]*)/);
  return m ? m[1] : '';
}

function runTest(q) {
  if (q.discuss) { return { pass:true, msg:'Solution revealed below.' }; }
  if (q.predict) {
    const userAnswer = (predictAnswers[q.id] || '').trim().toLowerCase().replace(/\s+/g,' ');
    if (!userAnswer) return { pass:false, msg:'Enter your answer first.', empty:true };
    const expected = q.answer.trim().toLowerCase().replace(/\s+/g,' ');
    return userAnswer === expected
      ? { pass:true,  msg:'Correct.' }
      : { pass:false, msg:`Wrong. Expected: "${q.answer}"` };
  }
  const code = (userCode[q.id] || '').trim();
  if (!code) return { pass:false, msg:'Write something first.', empty:true };
  try {
    if (q.altTest) {
      new Function(code)();
      const result = q.test(code);
      return result ? { pass:true, msg:'Tests passed.' } : { pass:false, msg:'Tests failed.' };
    } else {
      const fn = new Function(`${code}; return typeof ${getFnName(q)} !== 'undefined' ? ${getFnName(q)} : null;`)();
      if (!fn) return { pass:false, msg:`Function "${getFnName(q)}" not found.` };
      const pass = q.test(fn);
      return pass ? { pass:true, msg:'Tests passed.' } : { pass:false, msg:'Tests failed.' };
    }
  } catch(e) {
    return { pass:false, msg:'Error: ' + e.message, isError:true };
  }
}

  if (list.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="e-icon">🎯</div><div class="e-msg">No questions match.</div></div>';
    return;
  }

  if (currentIndex >= list.length) currentIndex = list.length - 1;
  if (currentIndex < 0) currentIndex = 0;

  const renderList = viewMode === 'one' ? [list[currentIndex]] : list;

  renderList.forEach((q) => {
    const isSolved = solved.has(q.id);

    const exHtml = q.example ? `<div class="q-example">

    </div>` : '';

    const predictSnippet = q.predict ? `
      <div class="code-snippet">
        <div class="snippet-toolbar"><div class="snippet-lang">javascript</div></div>
        <pre class="snippet-code">${escHtml(q.code)}</pre>
      </div>
    ` : '';

    const leftHtml = `
      <div class="q-desc">${q.desc}</div>

      ${predictSnippet}
      <div class="hint-box" id="hint-${q.id}" style="display:${visHint[q.id]?'block':'none'}">
        <div class="hint-label">hint</div>${q.hint}
      </div>
      <div class="sol-box" id="sol-${q.id}" style="display:${visSol[q.id]?'block':'none'}">
        <div class="sol-toolbar">solution</div>
        <div class="sol-code">${escHtml(q.sol)}</div>
      </div>
    `;

    const editorHtml = q.discuss ? `
      <div class="predict-input-wrap">
        <div class="discuss-label">your answer</div>
        <textarea class="discuss-input" id="pi-${q.id}" placeholder="Write your answer..." spellcheck="false">${predictAnswers[q.id]||''}</textarea>
      </div>
    ` : q.predict ? `
      <div class="predict-input-wrap">
        <div class="predict-label">output</div>
        <textarea class="predict-input" id="pi-${q.id}" placeholder="What does this output?" spellcheck="false">${predictAnswers[q.id]||''}</textarea>
      </div>
    ` : `
      <div class="editor-wrap" id="ew-${q.id}">
        <div class="editor-toolbar">
          <div class="editor-lang">javascript</div>
          <div class="editor-shortcuts">tab · ctrl+/</div>
        </div>
        <div class="cm-wrap" id="cm-${q.id}"></div>
      </div>
    `;

    // Build header controls: unsolved btn (if solved) + review btn
    const unsolvedBtn = isSolved
      ? `<button class="btn-unsolved" onclick="markUnsolved(${q.id})" title="Mark as not solved">↩ retry</button>`
      : '';

    card.innerHTML = `
      <div class="q-header">
        <div class="q-num">#${String(q.id).padStart(2,'0')}</div>
        <div class="q-title-wrap">
          <div class="q-title">${q.title}</div>
          <div class="q-badges">
            <span class="badge badge-${q.diff}">${q.diff}</span>
            ${q.predict ? '<span class="badge" style="background:var(--amber-dim);color:var(--amber);font-family:var(--font-mono);font-size:10px;padding:1px 6px;border-radius:3px;">predict</span>' : ''}
            ${q.discuss ? '<span class="badge" style="background:var(--blue-dim);color:var(--blue);font-family:var(--font-mono);font-size:10px;padding:1px 6px;border-radius:3px;">discuss</span>' : ''}
            ${isSolved ? '<span class="badge badge-solved" id="solved-badge-'+q.id+'">solved</span>' : '<span class="badge badge-solved" id="solved-badge-'+q.id+'" style="display:none">solved</span>'}
          </div>
        </div>
        <div class="q-header-controls">
          <span id="unsolved-btn-${q.id}">${unsolvedBtn}</span>
          <button class="btn-review ${reviewLater.has(q.id)?'active':''}" onclick="toggleReview(${q.id})">${reviewLater.has(q.id)?'★':'☆'}</button>
        </div>
      </div>
      <div class="q-body">
        <div class="q-left">
          ${leftHtml}
          <div class="left-btns">
            <button class="btn btn-hint" onclick="toggleHint(${q.id})">${visHint[q.id]?'Hide hint':'Hint'}</button>
            <button class="btn btn-sol" onclick="toggleSol(${q.id})">${visSol[q.id]?'Hide solution':'Solution'}</button>
          </div>
        </div>
        <div class="q-right">
          ${editorHtml}
          <div class="result-box" id="res-${q.id}"></div>
          <div class="action-row">
            <button class="btn btn-run" onclick="handleRun(${q.id})">${q.discuss ? 'Show solution' : q.predict ? 'Check' : 'Run'}</button>
            <button class="btn btn-reset" onclick="resetCode(${q.id})">Reset</button>
          </div>
        </div>
      </div>
    `;
    container.appendChild(card);

    if (q.predict || q.discuss) {
      const pi = document.getElementById('pi-' + q.id);
      if (pi) pi.addEventListener('input', () => { predictAnswers[q.id] = pi.value; persist(); });
    } else {
      const cmHost = document.getElementById('cm-' + q.id);
      const cmInstance = CodeMirror(cmHost, {
        value: userCode[q.id] || '',
        mode: 'javascript',
        lineNumbers: true,
        matchBrackets: true,
        autoCloseBrackets: true,
        styleActiveLine: true,
        indentUnit: 2,
        tabSize: 2,
        indentWithTabs: false,
        extraKeys: {
          'Tab':         cm => cm.execCommand('indentMore'),
          'Shift-Tab':   cm => cm.execCommand('indentLess'),
          'Ctrl-/':      cm => cm.execCommand('toggleComment'),
          'Cmd-/':       cm => cm.execCommand('toggleComment'),
          'Ctrl-Enter':  () => window.handleRun(q.id),
          'Cmd-Enter':   () => window.handleRun(q.id),
        },
      });
      cmInstance.on('change', () => { userCode[q.id] = cmInstance.getValue(); persist(); });
      editors[q.id] = cmInstance;
    }
  });

  // Nav bar for 'one' mode
  if (viewMode === 'one' && list.length > 1) {
    const nav = document.createElement('div');
    nav.className = 'card-nav';
    nav.innerHTML = `
      <button class="nav-btn" onclick="navCard(-1)" ${currentIndex===0?'disabled':''}>← Prev</button>
      <div class="nav-counter"><b>${currentIndex+1}</b> / ${list.length}</div>
      <button class="nav-btn" onclick="navCard(1)"  ${currentIndex===list.length-1?'disabled':''}>Next →</button>
    `;
    container.appendChild(nav);
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── Mark as unsolved ───
window.markUnsolved = function(id) {
  solved.delete(id);
  persist();
  renderSidebar();

  // Update card in place without full re-render
  const card = document.getElementById('card-' + id);
  if (card) {
    card.classList.remove('solved');
    // hide solved badge
    const badge = document.getElementById('solved-badge-' + id);
    if (badge) badge.style.display = 'none';
    // remove unsolved button
    const ub = document.getElementById('unsolved-btn-' + id);
    if (ub) ub.innerHTML = '';
    // hide result box
    const res = document.getElementById('res-' + id);
    if (res) res.style.display = 'none';
  }

  // If currently filtering by 'done', re-render to remove card from view
  if (activeDiff === 'done') renderCards();
};

window.handleRun = function(id) {
  const q = Q.find(x => x.id === id);
  const {pass, msg, isError, empty} = runTest(q);
  const box = document.getElementById('res-' + id);
  box.style.display = 'block';
  if (empty) { box.className='result-box result-err'; box.textContent='⚠ ' + msg; return; }
  if (pass) {
    box.className='result-box result-pass';
    box.textContent='✓ ' + msg;
    solved.add(id);
    persist();
    const card = document.getElementById('card-' + id);
    if (card) {
      card.classList.add('solved');
      const badge = document.getElementById('solved-badge-' + id);
      if (badge) badge.style.display = '';
      // show unsolved button
      const ub = document.getElementById('unsolved-btn-' + id);
      if (ub && !ub.innerHTML.trim()) {
        ub.innerHTML = `<button class="btn-unsolved" onclick="markUnsolved(${id})" title="Mark as not solved">↩ retry</button>`;
      }
    }
    renderSidebar();
  } else if (isError) {
    box.className='result-box result-err';
    box.textContent='⚠ ' + msg;
  } else {
    box.className='result-box result-fail';
    box.textContent='✗ ' + msg;
  }
};

window.toggleHint = function(id) {
  visHint[id] = !visHint[id];
  const el = document.getElementById('hint-' + id);
  if (el) el.style.display = visHint[id] ? 'block' : 'none';
  document.querySelectorAll('.btn-hint').forEach(b => {
    if (b.getAttribute('onclick') === `toggleHint(${id})`) {
      b.textContent = visHint[id] ? 'Hide hint' : 'Hint';
    }
  });
};

window.toggleSol = function(id) {
  visSol[id] = !visSol[id];
  const el = document.getElementById('sol-' + id);
  if (el) el.style.display = visSol[id] ? 'block' : 'none';
  document.querySelectorAll('.btn-sol').forEach(b => {
    if (b.getAttribute('onclick') === `toggleSol(${id})`) {
      b.textContent = visSol[id] ? 'Hide solution' : 'Solution';
    }
  });
};

window.resetCode = function(id) {
  userCode[id] = '';
  predictAnswers[id] = '';
  persist();
  if (editors[id]) { editors[id].setValue(''); editors[id].clearHistory(); }
  const pi = document.getElementById('pi-' + id);
  if (pi) pi.value = '';
  const res = document.getElementById('res-' + id);
  if (res) res.style.display = 'none';
};

window.setTopic = function(t) {
  activeTopic = t;
  activeDiff = 'all';
  currentIndex = 0;
  updateDiffPills();
  renderSidebar();
  renderHeader();
  renderCards();
  document.getElementById('mainArea').scrollTop = 0;
  window.scrollTo(0, 0);
  closeSidebar();
};

window.setDiff = function(d) {
  activeDiff = d;
  currentIndex = 0;
  updateDiffPills();
  renderCards();
  window.scrollTo(0, 0);
};

function updateDiffPills() {
  document.querySelectorAll('#diffFilter .filter-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.diff === activeDiff);
  });
}

window.toggleReview = function(id) {
  if (reviewLater.has(id)) {
    reviewLater.delete(id);
  } else {
    reviewLater.add(id);
  }
  persist();
  renderSidebar();
  const btn = document.querySelector(`.btn-review[onclick="toggleReview(${id})"]`);
  if (btn) {
    const isReview = reviewLater.has(id);
    btn.textContent = isReview ? '★' : '☆';
    btn.classList.toggle('active', isReview);
  }
  if (activeDiff === 'review') renderCards();
};

window.setView = function(mode) {
  viewMode = mode;
  currentIndex = 0;
  localStorage.setItem('jsdojo-view', mode);
  renderCards();
  window.scrollTo(0, 0);
};

window.navCard = function(delta) {
  const list = filtered();
  currentIndex = Math.max(0, Math.min(list.length - 1, currentIndex + delta));
  renderCards();
  window.scrollTo(0, 0);
};

document.addEventListener('keydown', function(e) {
  if (viewMode !== 'one') return;
  if (e.target.closest('.CodeMirror') || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); window.navCard(1); }
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { e.preventDefault(); window.navCard(-1); }
});

// ─── Init ───
renderSidebar();
renderHeader();
renderCards();
</script>
</body>
</html>
