<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MERN Interview Prep</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  [data-theme="dark"] {
    --bg: #1a1a1a;
    --surface: #242424;
    --surface2: #2e2e2e;
    --border: #3a3a3a;
    --text: #e0e0e0;
    --text2: #888;
    --p1: #e05555;
    --p2: #cc9a3a;
    --p3: #4aaa72;
    --p1-bg: #2a1f1f;
    --p2-bg: #282218;
    --p3-bg: #1a2820;
    --tag-bg: #333;
  }

  [data-theme="light"] {
    --bg: #f2f2f2;
    --surface: #ffffff;
    --surface2: #f7f7f7;
    --border: #e0e0e0;
    --text: #1a1a1a;
    --text2: #777;
    --p1: #c0392b;
    --p2: #a06b10;
    --p3: #2e7d52;
    --p1-bg: #fdf0f0;
    --p2-bg: #fdf7ee;
    --p3-bg: #eef8f3;
    --tag-bg: #eaeaea;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    transition: background 0.2s, color 0.2s;
  }

  .container { max-width: 820px; margin: 0 auto; padding: 0 16px; }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    transition: background 0.2s;
  }

  .header-inner {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    flex-wrap: wrap;
  }

  .site-title { font-size: 15px; font-weight: 700; }

  .hbadge {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 3px;
  }
  .hb1 { background: var(--p1-bg); color: var(--p1); }
  .hb2 { background: var(--p2-bg); color: var(--p2); }
  .hb3 { background: var(--p3-bg); color: var(--p3); }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .prog-label { font-size: 11px; color: var(--text2); white-space: nowrap; }

  .prog-bg {
    width: 72px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .prog-fill {
    height: 100%;
    background: var(--p3);
    border-radius: 2px;
    transition: width 0.3s;
    width: 0%;
  }

  .theme-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .theme-btn:hover { background: var(--border); }

  /* ── Filters ── */
  .filters {
    padding: 10px 0;
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 20px;
  }

  .fbtn {
    padding: 4px 11px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .fbtn:hover { color: var(--text); border-color: var(--text2); }
  .fbtn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

  .search {
    margin-left: auto;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 12px;
    width: 160px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search:focus { border-color: var(--text2); }
  .search::placeholder { color: var(--text2); }

  /* ── Priority Section ── */
  .psec { margin-bottom: 32px; }

  .psec-header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 4px;
  }

  .ptitle { font-size: 14px; font-weight: 700; }

  .pcount { font-size: 11px; color: var(--text2); margin-left: auto; }

  .pmeta { font-size: 12px; color: var(--text2); margin-bottom: 12px; }

  /* ── Category label ── */
  .clabel {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text2);
    padding: 8px 0 5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .clabel::after { content:''; flex:1; height:1px; background: var(--border); }

  /* ── Question card ── */
  .qcard {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 5px;
    margin-bottom: 4px;
    overflow: hidden;
    transition: border-color 0.12s;
  }
  .qcard:hover { border-color: var(--text2); }
  .qcard.done { opacity: 0.42; }
  .qcard.done .qtitle { text-decoration: line-through; color: var(--text2); }

  .qhead {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 9px 12px;
    cursor: pointer;
    user-select: none;
  }

  .qnum { font-size: 11px; color: var(--text2); min-width: 24px; flex-shrink: 0; }
  .qtitle { flex: 1; font-size: 13px; font-weight: 500; }

  .qtags { display: flex; gap: 4px; flex-shrink: 0; }
  .qtag {
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 3px;
    background: var(--tag-bg);
    color: var(--text2);
  }

  .qchev {
    font-size: 10px;
    color: var(--text2);
    transition: transform 0.18s;
    flex-shrink: 0;
  }
  .qcard.open .qchev { transform: rotate(180deg); }

  .qbody {
    display: none;
    border-top: 1px solid var(--border);
    padding: 11px 12px 11px 45px;
    background: var(--surface2);
    transition: background 0.2s;
  }
  .qcard.open .qbody { display: block; }

  .qtext {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.7;
  }

  .qtext code {
    font-family: 'Menlo', 'Consolas', monospace;
    background: var(--border);
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 11px;
    color: var(--text);
  }

  .markbtn {
    margin-top: 9px;
    padding: 3px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .markbtn:hover { border-color: var(--p3); color: var(--p3); }
  .markbtn.marked { background: var(--p3-bg); border-color: var(--p3); color: var(--p3); }

  .empty { text-align: center; padding: 40px; font-size: 13px; color: var(--text2); }

  footer {
    border-top: 1px solid var(--border);
    text-align: center;
    padding: 18px;
    margin-top: 36px;
    font-size: 12px;
    color: var(--text2);
  }

  @media (max-width: 520px) {
    .qtags { display: none; }
    .search { width: 110px; }
    .hbadge { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="container">
    <div class="header-inner">
      <span class="site-title">MERN Prep</span>
      <span class="hbadge hb1">🔴 P1 Must Know</span>
      <span class="hbadge hb2">🟡 P2 Should Know</span>
      <span class="hbadge hb3">🟢 P3 Good to Know</span>
      <div class="header-right">
        <span class="prog-label" id="progLabel">0 / 100</span>
        <div class="prog-bg"><div class="prog-fill" id="progFill"></div></div>
        <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">☀ Light</button>
      </div>
    </div>
  </div>
</header>

<div class="container">
  <div class="filters">
    <button class="fbtn active" data-f="all">All</button>
    <button class="fbtn" data-f="p1">🔴 P1</button>
    <button class="fbtn" data-f="p2">🟡 P2</button>
    <button class="fbtn" data-f="p3">🟢 P3</button>
    <button class="fbtn" data-f="react">React</button>
    <button class="fbtn" data-f="node">Node</button>
    <button class="fbtn" data-f="express">Express</button>
    <button class="fbtn" data-f="mongo">MongoDB</button>
    <button class="fbtn" data-f="auth">Auth</button>
    <input class="search" id="searchInput" type="text" placeholder="Search...">
  </div>
  <div id="app"></div>
  <footer>100 questions · MongoDB · React · Node.js · Express</footer>
</div>

<script>
const Q = {
  p1: {
    label:"Priority 1 — Must Know", color:"p1",
    meta:"Core fundamentals. Will definitely be asked. Master these first.",
    cats:{
      "Authentication & Security":[
        {n:2, tags:["auth","mongo"], title:"Mongoose User schema with bcrypt pre-save hook", body:`Create a Mongoose schema for a <code>User</code> with: <code>name</code> (required string), <code>email</code> (required, unique, lowercase), <code>password</code> (min 8 chars), <code>role</code> (enum: admin/user, default "user"), <code>createdAt</code> (auto). Add a pre-save hook that hashes the password using <code>bcrypt</code> before saving — only if password was modified.`},
        {n:3, tags:["auth","express"], title:"POST /api/register with duplicate email check", body:`Accept <code>name</code>, <code>email</code>, <code>password</code> from req.body. Check if user with that email exists. If yes → 409 <code>{ message: "Email already in use" }</code>. If no → hash password, save user, return 201 with saved user excluding the password field.`},
        {n:5, tags:["auth","express"], title:"JWT authenticate middleware", body:`Read JWT from <code>Authorization: Bearer &lt;token&gt;</code> header. Verify using <code>jsonwebtoken</code>. If valid → attach <code>req.user = decoded</code> and call <code>next()</code>. If missing or invalid → 401 <code>{ message: "Unauthorized" }</code>.`},
        {n:9, tags:["auth","express"], title:"POST /api/login with bcrypt compare", body:`Accept <code>email</code> and <code>password</code>. Find user by email. Compare with <code>bcrypt.compare</code>. If valid → return signed JWT with <code>{ id, email, role }</code> and 7-day expiry. If invalid → 401 <code>{ message: "Invalid credentials" }</code>.`},
        {n:10, tags:["auth","react"], title:"AuthContext with login/logout", body:`Store <code>user</code> and <code>token</code> in state. <code>login(token)</code> decodes JWT and sets user. <code>logout()</code> clears state and localStorage. Wrap app with provider. Write a <code>useAuth()</code> hook to consume context.`},
        {n:20, tags:["auth","react"], title:"ProtectedRoute with role check (v6)", body:`Read token from AuthContext. Not authenticated → redirect to <code>/login</code>. Authenticated but wrong role (passed as prop) → redirect to <code>/unauthorized</code>. Otherwise render child component.`},
        {n:26, tags:["auth","express"], title:"roleGuard(...roles) middleware", body:`Used after authenticate. Accepts roles e.g. <code>roleGuard("admin","moderator")</code>. Checks <code>req.user.role</code> against allowed roles. Returns 403 if no match. Show example route using both middlewares.`},
        {n:58, tags:["auth","express","react"], title:"JWT in httpOnly cookies vs localStorage", body:`On login set JWT as <code>httpOnly</code>, <code>Secure</code>, <code>SameSite=Strict</code> cookie. Authenticate middleware reads from <code>req.cookies</code>. POST /api/logout clears the cookie. React uses axios with <code>withCredentials: true</code>. Comment why httpOnly is safer.`},
      ],
      "Express Fundamentals":[
        {n:1, tags:["express","mongo"], title:"Express server with MongoDB health check", body:`Connect to MongoDB with Mongoose. <code>GET /health</code> returns <code>{ status: "ok", db: "connected" }</code> if DB active, else 500 <code>{ status: "error", db: "disconnected" }</code>.`},
        {n:13, tags:["express","auth"], title:"PUT /api/users/:id with ownership check", body:`Protected by authenticate. User can only update own profile (compare <code>req.user.id</code> vs <code>req.params.id</code>). Admins update anyone. Non-admin updating someone else → 403. Use <code>findByIdAndUpdate</code> with <code>{ new: true, runValidators: true }</code>.`},
        {n:15, tags:["express"], title:"Global error handler middleware", body:`Catches errors via <code>next(err)</code>. Mongoose <code>ValidationError</code> → 400 with field messages. <code>CastError</code> → 400 "Invalid ID". JWT <code>JsonWebTokenError</code> → 401. All others → 500 generic in production.`},
        {n:64, tags:["express"], title:"CORS from scratch — no cors package", body:`Allow only origins in a whitelist array. Handle preflight OPTIONS requests. Set <code>Access-Control-Allow-Methods</code>, <code>Allow-Headers</code>, <code>Allow-Credentials</code>. Return 403 for non-whitelisted origins.`},
        {n:93, tags:["express"], title:"Router-level structure with express.Router()", body:`Separate routers for /api/users, /api/posts, /api/auth in own files. Auth middleware on users/posts only. Central app.js mounts all. Use <code>router.param()</code> to validate <code>:id</code> before any route handler.`},
        {n:94, tags:["express","node"], title:"Async error handling — asyncHandler wrapper", body:`Show async route handlers silently swallow errors — demo the bug. Write <code>asyncHandler(fn)</code> that catches rejections and passes to <code>next(err)</code>. Apply to all routes. Add global <code>unhandledRejection</code> as safety net.`},
        {n:95, tags:["express"], title:"API versioning — v1 and v2 coexisting", body:`v1: GET /api/v1/users returns <code>{ id, name, email }</code>. v2: same route with more fields and pagination. Both coexist without breaking clients. Separate v1/v2 controller folders.`},
      ],
      "React Fundamentals":[
        {n:6, tags:["react"], title:"useFetch(url) custom hook", body:`Fetches data on mount. Returns <code>{ data, loading, error }</code>. Cleanup to avoid state updates on unmounted components. Re-fetches when URL changes.`},
        {n:7, tags:["react"], title:"UserList — loading, error, and success states", body:`Fetch users from GET /api/users. Show loading spinner while fetching. Error message on failure. Render list of user names on success. Use useEffect + useState.`},
        {n:8, tags:["react","auth"], title:"LoginForm with axios and redirect", body:`Controlled inputs for email/password. On submit → POST /api/login. On success → store JWT in localStorage, redirect to /dashboard. On failure → display error message below form.`},
        {n:14, tags:["react"], title:"useLocalStorage(key, initialValue) hook", body:`Works like useState but persists to localStorage. Reads initial value from storage. Updates on change. JSON serialization with try/catch.`},
        {n:63, tags:["react"], title:"useDebounce and useThrottle — write both, show difference", body:`Write both hooks from scratch. Demo in a search input: show what fires when user types rapidly. Debounce waits until typing stops. Throttle limits frequency regardless.`},
        {n:65, tags:["react"], title:"useReducer shopping cart", body:`Actions: ADD_ITEM (increment if exists), REMOVE_ITEM, UPDATE_QUANTITY (remove at 0), CLEAR_CART. Derive <code>cartTotal</code> and <code>itemCount</code> from state using useMemo.`},
        {n:76, tags:["react"], title:"usePrevious(value) hook with real use case", body:`Stores previous render's value using useRef. Demo: counter showing current and previous count. Highlight in red if value decreased.`},
        {n:82, tags:["react"], title:"Code splitting with React.lazy and Suspense", body:`Three routes: /home, /dashboard, /profile. Each lazily loaded with React.lazy() wrapped in Suspense. Show loading spinner fallback. Comment how this reduces initial bundle size.`},
        {n:83, tags:["react"], title:"Light/dark theme with Context API (no Redux)", body:`Theme context stores current theme. Persist to localStorage. Toggle CSS class on document.body. Any nested component reads/changes theme via <code>useTheme()</code> hook — no prop drilling.`},
        {n:84, tags:["react"], title:"Fix all three types of unnecessary re-renders", body:`Case 1: parent causes child re-render despite same props → React.memo. Case 2: callback recreated every render → useCallback. Case 3: expensive computation runs every render → useMemo. Prove each fix with console.log.`},
      ],
      "React Patterns":[
        {n:81, tags:["react","auth"], title:"HOC withAuth(WrappedComponent)", body:`Checks authentication via AuthContext. Not authenticated → redirect to /login. Authenticated → render WrappedComponent passing all props through. Demo by wrapping a Dashboard component.`},
        {n:86, tags:["react"], title:"useEffect infinite re-render bug with object dependency", body:`Demo the bug: object dependency causes infinite re-renders. Fix 1: useRef + JSON.stringify deep compare. Fix 2 (correct): restructure to use primitive dependencies. Explain why each works.`},
      ],
      "Mongoose & MongoDB":[
        {n:4, tags:["express","mongo"], title:"GET /api/users — pagination, filtering, sorting", body:`Pagination via <code>?page=1&limit=10</code>. Filter by role via <code>?role=admin</code>. Sort by createdAt desc by default. Return <code>{ data, total, page, totalPages }</code>.`},
        {n:11, tags:["mongo"], title:"Mongoose query with populate and multiple filters", body:`Find Orders where <code>status: "pending"</code> AND createdAt older than 24 hours. Populate userId with only name and email. Return specific fields only. Limit 50, sorted by createdAt asc.`},
        {n:42, tags:["mongo"], title:"Schema with virtual, instance method, and static method", body:`Product schema. Virtual <code>isInStock</code> (stock > 0). Instance method <code>applyDiscount(percent)</code> returns discounted price without saving. Static <code>findByCategory(cat)</code> sorted by price asc. Enable virtuals in toJSON.`},
        {n:66, tags:["mongo"], title:"Post-delete hook — clean up related documents", body:`After User findOneAndDelete, auto-delete all posts, comments, and likes by that user. deleteMany per collection. Log count of cleaned docs per collection.`},
        {n:97, tags:["mongo"], title:"Soft deletes with automatic query filtering", body:`Add <code>isDeleted</code> and <code>deletedAt</code> fields. Override find/findOne/findById via pre hook to exclude deleted docs automatically. Write <code>softDelete(id)</code> and <code>findWithDeleted(id)</code> for admin use.`},
        {n:99, tags:["mongo"], title:"N+1 problem — demonstrate and fix three ways", body:`Bad: fetch 10 posts, loop to fetch each author (11 queries). Fix 1: .populate() (2 queries). Fix 2: single $lookup aggregation. Comment trade-offs of each approach.`},
      ],
      "CRUD":[
        {n:17, tags:["express","mongo","auth"], title:"Full CRUD for Posts with auth and ownership", body:`POST — create (auth required, sets author to req.user.id). GET all — with author name populated. GET single. PUT — only original author. DELETE — author or admin. All routes protected.`},
      ],
      "Node.js Core":[
        {n:89, tags:["node"], title:"Event loop — execution order and blocking bug fix", body:`Show execution order of setTimeout, setImmediate, process.nextTick, resolved Promises, sync code. Comment which event loop phase each runs in. Demo blocking loop bug. Fix with setImmediate chunking.`},
        {n:90, tags:["node"], title:"Streams pipeline — read, transform, write a large file", body:`Read large file with fs.createReadStream(). Transform each line to uppercase with a Transform stream. Write to new file with fs.createWriteStream(). Log progress without loading into memory. Handle errors on each stream.`},
      ]
    }
  },
  p2: {
    label:"Priority 2 — Should Know", color:"p2",
    meta:"Separates average candidates from good ones. Asked in mid-to-senior rounds.",
    cats:{
      "React Patterns":[
        {n:12, tags:["react"], title:"SearchBar with manual debounce (no library)", body:`Text input. Debounce 500ms manually before calling GET /api/users?search=query. Show results as dropdown. Implement debounce yourself — no lodash.`},
        {n:16, tags:["react"], title:"Render 10,000 items — memo and useCallback", body:`10k item list, each with a Delete button. Apply React.memo and useCallback with comments explaining where and why each is applied.`},
        {n:18, tags:["react"], title:"useForm(initialValues, validate) custom hook", body:`Manages all field values in a single object. Tracks touched fields. Runs validate, stores errors. Returns <code>{ values, errors, touched, handleChange, handleBlur, handleSubmit }</code>.`},
        {n:25, tags:["react"], title:"AutoSaveForm — debounce with Typing/Saving/Saved status", body:`Textarea for notes. Auto-save to PUT /api/notes/:id 2s after typing stops. Show status: "Typing...", "Saving...", "Saved". Cancel pending save if user resumes typing.`},
        {n:28, tags:["react"], title:"Optimistic UI updates with rollback on failure", body:`Todo list. On "Complete" → immediately update UI. In background send PUT. If it fails → revert UI to previous state and show error toast.`},
        {n:32, tags:["react"], title:"Multi-step form — 3 steps with review screen", body:`Step 1: name, email. Step 2: password + confirm with validation. Step 3: review all data with Edit button per section. State in parent only. Final submit sends one POST.`},
        {n:34, tags:["react"], title:"DataTable — sort, filter, pagination (no libraries)", body:`Props: columns array, data array. Click headers to toggle asc/desc. Search input filters all columns. Pagination with configurable size. Only useState and useMemo.`},
        {n:43, tags:["react"], title:"Toast notification system from scratch", body:`useToast() hook with showToast(message, type, duration). Types: success, error, info. Multiple toasts each with own timer. Auto-dismiss. Stack in top-right with CSS slide-in animation.`},
        {n:45, tags:["react"], title:"Modal — Portal, focus trap, Escape key, accessibility", body:`Render into document.body via createPortal. Tab cycles only through focusable elements. Close on Escape. Close on backdrop click, not content click. Prevent body scroll. Correct aria attributes.`},
        {n:54, tags:["react"], title:"useUndoRedo(initialState) hook", body:`Returns <code>{ state, set, undo, redo, canUndo, canRedo }</code>. History and future stacks. set() pushes to history, clears future. Demo with text editor using Ctrl+Z / Ctrl+Y.`},
        {n:68, tags:["react"], title:"Pagination component with ellipsis (...)", body:`Props: totalItems, itemsPerPage, currentPage, onPageChange. Render page numbers with ellipsis — always show first, last, pages near current. Prev/Next disabled at boundaries.`},
        {n:70, tags:["react"], title:"ErrorBoundary — catch, fallback, recover, log", body:`Class component catching render errors. Fallback UI with "Try Again" reset button. Log error + component stack to POST /api/logs/client-error. Demo recovery from a thrown error.`},
        {n:73, tags:["react"], title:"Recursive tree — expand/collapse nodes + Expand All", body:`Data: <code>{ id, name, children: [...] }</code> any depth. Each node collapses/expands independently. Expand All / Collapse All buttons. onSelect(node) callback. Highlight selected node.`},
        {n:85, tags:["react"], title:"useEventListener hook + useKeyPress on top", body:`useEventListener(eventName, handler, element) — defaults to window. useRef for latest handler without re-subscribing. Cleanup on unmount. Build useKeyPress(key) on top of it.`},
        {n:87, tags:["react"], title:"Tabs — URL persistence and arrow key navigation", body:`Accepts <code>tabs: [{ label, content }]</code>. Active tab in URL as ?tab=overview (survives refresh). Left/Right arrow keys navigate between tabs.`},
        {n:88, tags:["react"], title:"Tooltip with Portal and viewport-aware positioning", body:`Popup renders into document.body via portal. Shows on hover. Positions above or below based on viewport space using getBoundingClientRect(). Dismisses on scroll or when target leaves viewport.`},
      ],
      "Node.js & Express":[
        {n:23, tags:["express"], title:"Rate limiting middleware — no library", body:`Max 10 requests per IP per minute. Store counts in plain JS object. Return 429 when exceeded. Reset after 60 seconds. No third-party packages.`},
        {n:29, tags:["express","auth"], title:"Forgot password / reset password flow", body:`POST /api/forgot-password: generate token via crypto, save hashed version + 1hr expiry to user, console.log reset link. POST /api/reset-password: find user by hashed non-expired token, update password, clear token fields.`},
        {n:37, tags:["express","mongo"], title:"Cursor-based pagination instead of offset", body:`GET /api/posts?cursor=lastPostId&limit=10. Use <code>_id > cursor</code>. Return <code>{ data, nextCursor, hasMore }</code>. Comment why cursor-based is better for large datasets.`},
        {n:41, tags:["node"], title:"Request logging middleware — console and file", body:`Log method, URL, status, response time. Format: <code>[2024-01-15 10:23:45] GET /api/users 200 45ms</code>. Write to console and append to logs/app.log using built-in fs. Skip /health.`},

const allQs = [];
for (const [pk, pd] of Object.entries(Q)) {
  for (const [cat, qs] of Object.entries(pd.cats)) {
    for (const q of qs) allQs.push({...q, pk, cat});
  }
}

let filter = 'all', search = '';
let done = new Set(JSON.parse(localStorage.getItem('mern3_done') || '[]'));

function saveDone() { localStorage.setItem('mern3_done', JSON.stringify([...done])); }

function updateProg() {
  const pct = Math.round((done.size / allQs.length) * 100);
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progLabel').textContent = `${done.size} / ${allQs.length}`;
}

function matches(q) {
  const fo = filter === 'all' || filter === q.pk || q.tags.includes(filter);
  const so = !search || q.title.toLowerCase().includes(search) || q.tags.some(t => t.includes(search));
  return fo && so;
}

function render() {
  let html = '', total = 0;
  for (const [pk, pd] of Object.entries(Q)) {
    let sec = '', cnt = 0;
    for (const [cat, qs] of Object.entries(pd.cats)) {
      const vis = qs.filter(q => matches({...q, pk}));
      if (!vis.length) continue;
      cnt += vis.length;
      sec += `<div class="clabel">${cat}</div>`;
      for (const q of vis) {
        const d = done.has(q.n);
        sec += `<div class="qcard ${pd.color} ${d?'done':''}" id="qc${q.n}">
          <div class="qhead" onclick="tog(${q.n})">
            <span class="qnum">#${String(q.n).padStart(2,'0')}</span>
            <span class="qtitle">${q.title}</span>
            <div class="qtags">${q.tags.map(t=>`<span class="qtag">${t}</span>`).join('')}</div>
            <span class="qchev">▾</span>
          </div>
          <div class="qbody">
            <div class="qtext">${q.body}</div>
            <button class="markbtn ${d?'marked':''}" onclick="mkDone(${q.n},event)">${d?'✓ Done':'Mark done'}</button>
          </div>
        </div>`;
      }
    }
    if (!cnt) continue;
    total += cnt;
    html += `<div class="psec">
      <div class="psec-header">
        <span class="hbadge hb${pk}">${pk==='p1'?'🔴':pk==='p2'?'🟡':'🟢'} ${pd.label}</span>
        <span class="pcount">${cnt} questions</span>
      </div>
      <div class="pmeta">${pd.meta}</div>
      ${sec}
    </div>`;
  }
  document.getElementById('app').innerHTML = total ? html : `<div class="empty">No questions found.</div>`;
  updateProg();
}

function tog(n) { document.getElementById('qc'+n).classList.toggle('open'); }

function mkDone(n, e) {
  e.stopPropagation();
  const card = document.getElementById('qc'+n);
  const btn = card.querySelector('.markbtn');
  if (done.has(n)) {
    done.delete(n); card.classList.remove('done');
    btn.classList.remove('marked'); btn.textContent = 'Mark done';
  } else {
    done.add(n); card.classList.add('done');
    btn.classList.add('marked'); btn.textContent = '✓ Done';
  }
  saveDone(); updateProg();
}

function toggleTheme() {
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', dark ? 'light' : 'dark');
  document.getElementById('themeBtn').textContent = dark ? '🌙 Dark' : '☀ Light';
}

document.querySelectorAll('.fbtn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.fbtn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    filter = b.dataset.f;
    render();
  });
});

let st;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(st);
  st = setTimeout(() => { search = e.target.value.trim().toLowerCase(); render(); }, 200);
});

render();
</script>
